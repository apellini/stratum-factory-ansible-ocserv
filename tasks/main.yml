---
# tasks/main.yml — stratum-factory-ansible-ocserv
# Install ocserv, generate self-signed TLS cert, and deploy config.

- name: Update apt package cache (Debian family)
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts['os_family'] == "Debian"

- name: Install ocserv
  ansible.builtin.package:
    name: ocserv
    state: present

- name: Create certificate directory
  ansible.builtin.file:
    path: "{{ ocserv_cert_dir }}"
    state: directory
    mode: "0700"
    owner: root
    group: root

- name: Generate private key
  community.crypto.openssl_privatekey:
    path: "{{ ocserv_cert_dir }}/server.key"
    size: 4096

- name: Generate certificate signing request
  community.crypto.openssl_csr:
    path: "{{ ocserv_cert_dir }}/server.csr"
    privatekey_path: "{{ ocserv_cert_dir }}/server.key"
    common_name: "{{ ocserv_cert_cn }}"

- name: Generate self-signed certificate
  community.crypto.x509_certificate:
    path: "{{ ocserv_cert_dir }}/server.crt"
    privatekey_path: "{{ ocserv_cert_dir }}/server.key"
    csr_path: "{{ ocserv_cert_dir }}/server.csr"
    provider: selfsigned
    selfsigned_not_after: "+{{ ocserv_cert_days }}d"

# When ocserv_listen_interface is explicit, use it as-is (override path; also
# exercised by molecule tests that pass eth0).  When the default "" is kept, derive
# the NIC from the default-route interface reported in gathered facts (Ubuntu 24.04
# on GCP: ens4).  The assert below catches misconfiguration early.
- name: Resolve ocserv listen interface (explicit override, else default-route interface)
  ansible.builtin.set_fact:
    _ocserv_listen_iface: >-
      {{ ocserv_listen_interface if (ocserv_listen_interface | length > 0)
         else (ansible_facts.default_ipv4.interface | default('')) }}

- name: Resolve listen-host IP from the interface
  ansible.builtin.set_fact:
    _ocserv_listen_host: >-
      {{ (ansible_facts[_ocserv_listen_iface].ipv4.address | default(''))
         if (_ocserv_listen_iface | length > 0) else '' }}

- name: Assert ocserv listen-host resolved
  ansible.builtin.assert:
    that:
      - _ocserv_listen_host | length > 0
    fail_msg: >-
      Could not resolve ocserv listen-host IP (interface='{{ _ocserv_listen_iface }}').
      Set ocserv_listen_interface to a valid interface with an IPv4 address, or ensure
      the default-route interface has one.
    success_msg: "ocserv will bind listen-host = {{ _ocserv_listen_host }} ({{ _ocserv_listen_iface }})"

- name: Deploy ocserv configuration
  ansible.builtin.template:
    src: ocserv.conf.j2
    dest: /etc/ocserv/ocserv.conf
    mode: "0640"
    owner: root
    group: root
  notify: Restart ocserv

- name: Enable and start ocserv service
  ansible.builtin.service:
    name: ocserv
    enabled: true
    state: started
